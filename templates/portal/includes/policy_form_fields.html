{% load i18n %}
<div class="jd-form-group">
  <label class="jd-label">
    {% trans "Service Type" %}
    <span style="color:var(--color-danger);">*</span>
  </label>
  {{ form.service_type }}
</div>
<div class="portal-field-row portal-field-row--2">
  <div class="jd-form-group">
    <label class="jd-label">
      {% trans "Days Before Service" %}
      <span style="color:var(--color-danger);">*</span>
    </label>
    {{ form.days_before_service }}
    <div style="font-size:var(--text-xs);color:var(--color-muted);
                margin-top:0.25rem;">
      {% trans "Minimum days before the service date for this tier to apply." %}
    </div>
  </div>
  <div class="jd-form-group">
    <label class="jd-label">
      {% trans "Refund %" %}
      <span style="color:var(--color-danger);">*</span>
    </label>
    {{ form.refund_percentage }}
    <div style="font-size:var(--text-xs);color:var(--color-muted);
                margin-top:0.25rem;">
      {% trans "0 = no refund, 100 = full refund." %}
    </div>
  </div>
</div>
<div class="jd-form-group">
  <label class="jd-label">
    {% trans "Label (English)" %}
    <span style="color:var(--color-danger);">*</span>
  </label>
  {{ form.label_en }}
</div>
<div class="jd-form-group mb-0">
  <div style="display:flex;align-items:center;gap:0.5rem;">
    {{ form.is_active }}
    <label style="font-size:var(--text-sm);color:var(--color-text);
                  margin:0;cursor:pointer;">
      {% trans "Active (applied to new bookings)" %}
    </label>
  </div>
</div>
