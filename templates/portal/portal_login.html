{% load static i18n %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% trans "Staff Login" %} — Jadevine Portal</title>
  <link rel="icon" type="image/png" href="{% static 'images/logo.png' %}" />

  <!-- Bootstrap 5 -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Jost:wght@300;400;500;600&display=swap"
        rel="stylesheet">
  <!-- Design system variables (colours, fonts) -->
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
  <!-- Portal login page styles -->
  <link rel="stylesheet" href="{% static 'css/portal/portal_base.css' %}">

  <link rel="stylesheet" href="{% static 'css/portal/portal_login.css' %}">
</head>
<body>

<div class="portal-login-card">

  <!-- Brand -->
  <div class="portal-login-logo">
    <span class="brand-name">Jadevine Travel &amp; Tours</span>
    <span class="portal-label">{% trans "Staff Portal" %}</span>
    <div class="portal-divider"></div>
  </div>

  <!-- Error -->
  {% if error %}
  <div class="portal-error">
    <i class="bi bi-exclamation-circle-fill"></i>
    {{ error }}
  </div>
  {% endif %}

  <!-- Login form -->
  <form method="post" action="{% url 'portal:login' %}">
    {% csrf_token %}
    {% if request.GET.next %}
    <input type="hidden" name="next" value="{{ request.GET.next }}">
    {% endif %}

    <div class="jd-form-group">
      <label class="jd-label" for="id_username">
        {% trans "Username" %}
      </label>
      <div class="jd-input-icon-wrap">
        <i class="bi bi-person jd-input-icon"></i>
        <input
          type="text"
          id="id_username"
          name="username"
          class="jd-input"
          value="{{ username|default:'' }}"
          autocomplete="username"
          autofocus
          required
          placeholder="{% trans 'Enter your username' %}"
        >
      </div>
    </div>

    <div class="jd-form-group mt-3">
      <label class="jd-label" for="id_password">
        {% trans "Password" %}
      </label>
      <div class="jd-input-icon-wrap">
        <i class="bi bi-lock jd-input-icon"></i>
        <input
          type="password"
          id="id_password"
          name="password"
          class="jd-input"
          autocomplete="current-password"
          required
          placeholder="{% trans 'Enter your password' %}"
        >
        <button
          type="button"
          class="password-toggle"
          aria-label="{% trans 'Toggle password visibility' %}"
          tabindex="-1"
        >
          <i class="bi bi-eye" id="pwd-eye"></i>
        </button>
      </div>
    </div>

    <button type="submit" class="btn-primary-jd w-100 mt-4">
      <i class="bi bi-box-arrow-in-right"></i> {% trans "Sign In" %}
    </button>
  </form>

  <div class="portal-login-footer">
    {% trans "This area is restricted to authorised staff only." %}
  </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="{% static 'js/portal/portal_login.js' %}"></script>
</body>
</html>
